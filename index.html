<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="referrer" content="no-referrer">
    
    <title>Relick - Entorno de Pruebas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button id="btn-audio" onclick="AudioSystem.toggleMute()">🔊</button>
    <button onclick="Game.iniciar('prueba')" class="fixed top-[20px] right-5 z-[9999] bg-blue-600 border border-blue-400 text-white font-bold py-2 px-4 rounded-full hover:bg-blue-500 shadow-[0_0_15px_rgba(0,210,255,0.5)] transition-all active:scale-95 text-xs">
        ↻ REINICIAR TEST
    </button>
    
    <div class="game-container" id="game-root" style="display:none;">
        <div class="stats-bar border-b-0 border-t-2 border-red-600">
            <div class="flex items-center w-[30%]">
                <div class="w-6 h-6 rounded-full bg-gray-800 border border-gray-600 flex items-center justify-center mr-1 shrink-0 text-xs" id="rival-avatar-icon">😈</div>
                <span class="text-[9px] font-bold text-gray-400 truncate"><span id="rival-name-label">RIVAL</span> <span id="r-status" class="text-yellow-400 ml-1 animate-pulse"></span></span>
            </div>
            <div class="flex flex-col items-center w-[40%] px-2">
                <div class="flex justify-between w-full text-[9px] mb-[2px]"><span class="text-gray-400 font-bold">HP</span><span id="rival-lp-text" class="text-white font-bold">8/8</span></div>
                <div class="w-full h-2.5 bg-gray-800 rounded-full overflow-hidden border border-gray-600 shadow-inner"><div id="rival-lp-bar" class="h-full bg-green-500 transition-all duration-300 w-full shadow-[0_0_8px_rgba(0,255,65,0.6)]"></div></div>
            </div>
            <div class="text-[12px] text-blue-400 w-[30%] text-right font-black uppercase tracking-wider flex items-center justify-end">PR: <span id="top-pr-count" class="text-white text-lg ml-1">0</span></div>
        </div>

        <div class="phase-bar relative z-50">
            <div id="p-DRAW" class="phase-item active">DRAW</div><div id="p-COMBAT" class="phase-item">COMBAT</div><div id="p-ACTION" class="phase-item">ACTION</div><div id="p-END" class="phase-item">END</div>
            <div id="btn-next-phase" class="w-20 bg-red-600 text-white flex items-center justify-center text-[10px] cursor-pointer active:bg-red-800" onclick="Game.nextPhase()">SIG. ▶</div>
        </div>

        <div class="board relative z-50">
            <div class="player-area opacity-80 scale-[0.98] origin-top">
                <div id="rival-hand-visual" class="rival-hand-container"></div>
                <div class="board-row">
                    <div class="slot" id="r-slot-bonus" onclick="Game.showFieldDetail('bonus', true)"><span class="slot-title">BONUS</span></div>
                    <div class="canje-col"><div class="slot-canje" id="r-slot-canje1" onclick="Game.showFieldDetail('canje1', true)"></div><div class="slot-canje" id="r-slot-canje2" onclick="Game.showFieldDetail('canje2', true)"></div></div>
                    <div class="slot" id="r-slot-equipo" onclick="Game.showFieldDetail('equipo', true)"><span class="slot-title text-green-500">EQ</span></div>
                    <div class="relikario-hex border-gray-500 bg-cover bg-center cursor-pointer hover:shadow-[0_0_20px_rgba(0,210,255,0.5)] transition-all relative" onclick="Game.showRelikarioDetail('p2')" id="r-yuno-char" style="background-image: url('https://i.imgur.com/fADj01M.png');"><div id="r-relikario-badges" class="absolute -top-2 -right-2 flex gap-1 z-50"></div></div>
                    <div class="slot border-red-900/50" onclick="Game.showMemoria('rival')"><span class="slot-title text-red-500/80">MEM</span><span id="r-mem-count" class="text-red-400 font-bold mt-2 text-sm">0</span></div>
                    <div class="hab-grid"><div class="slot-hab" id="r-slot-hab0" onclick="Game.showFieldDetail('hab0', true)"></div><div class="slot-hab" id="r-slot-hab300" onclick="Game.showFieldDetail('hab300', true)"></div><div class="slot-hab" id="r-slot-hab500" onclick="Game.showFieldDetail('hab500', true)"></div><div class="slot-hab" id="r-slot-hab1000" onclick="Game.showFieldDetail('hab1000', true)"></div></div>
                    <div class="slot bg-[repeating-linear-gradient(45deg,#111,#111_4px,#222_4px,#222_8px)] border-dashed border-gray-700"><span class="slot-title text-[5px]">MAZO</span><span id="r-mazo-visual" class="text-xs font-bold text-gray-500 mt-2">42</span></div>
                </div>
            </div>

            <div class="h-px bg-white/10 w-full relative my-3">
                <div class="absolute inset-0 flex items-center justify-center">
                    <div id="game-status-msg" class="bg-black px-5 py-2 text-[11px] md:text-sm text-blue-400 tracking-[1.5px] uppercase font-black border border-blue-500/30 rounded-full shadow-[0_0_15px_rgba(0,210,255,0.1)] flex items-center gap-2 transition-all duration-300 z-10"><span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>CARGANDO...</div>
                </div>
            </div>

            <div class="player-area">
                <div class="board-row">
                    <div class="slot" id="p-slot-bonus" onclick="Game.clickSlot('bonus')"><span class="slot-title text-yellow-500">BONUS</span></div>
                    <div class="canje-col"><div class="slot-canje" id="p-slot-canje1" onclick="Game.clickSlot('canje1')"></div><div class="slot-canje" id="p-slot-canje2" onclick="Game.clickSlot('canje2')"></div></div>
                    <div class="slot" id="p-slot-equipo" onclick="Game.clickSlot('equipo')"><span class="slot-title text-green-400">EQUIPO</span></div>
                    <div class="relikario-hex bg-cover bg-center cursor-pointer hover:shadow-[0_0_20px_rgba(0,210,255,0.5)] transition-all relative" id="p-yuno-char" onclick="Game.showRelikarioDetail('p1')" style="background-image: url('https://i.imgur.com/fADj01M.png');"><div id="p-relikario-badges" class="absolute -top-2 -right-2 flex gap-1 z-50"></div></div>
                    <div class="slot" onclick="Game.clickMemoria()"><span class="slot-title text-blue-400">MEMORIA</span><span id="p-mem-count" class="text-blue-400 font-bold mt-2 text-sm">0</span></div>
                    <div class="hab-grid"><div class="slot-hab" id="p-slot-hab0" onclick="Game.clickSlot('hab0')"></div><div class="slot-hab" id="p-slot-hab300" onclick="Game.clickSlot('hab300')"></div><div class="slot-hab" id="p-slot-hab500" onclick="Game.clickSlot('hab500')"></div><div class="slot-hab" id="p-slot-hab1000" onclick="Game.clickSlot('hab1000')"></div></div>
                    <div class="slot bg-[repeating-linear-gradient(45deg,#111,#111_4px,#222_4px,#222_8px)] border-dashed border-gray-700"><span class="slot-title text-[5px]">MAZO</span><span id="p-mazo-visual" class="text-xs font-bold text-white mt-2">42</span></div>
                </div>
            </div>
        </div>

        <div class="hand relative z-50" id="player-hand"></div>

        <div class="stats-bar border-t-0 border-b-2 border-green-500 relative z-50">
            <div class="text-[10px] font-bold text-green-400 w-[30%]">TÚ</div>
            <div class="flex flex-col items-center w-[40%] px-2">
                <div class="flex justify-between w-full text-[9px] mb-[2px]"><span class="text-gray-400 font-bold">HP</span><span id="player-lp-text" class="text-white font-bold">8/8</span></div>
                <div class="w-full h-2.5 bg-gray-800 rounded-full overflow-hidden border border-gray-600 shadow-inner"><div id="player-lp-bar" class="h-full bg-green-500 transition-all duration-300 w-full shadow-[0_0_8px_rgba(0,255,65,0.6)]"></div></div>
            </div>
            <div class="text-[12px] text-blue-400 w-[30%] text-right font-black uppercase tracking-wider flex items-center justify-end">PR: <span id="bottom-pr-count" class="text-white text-lg ml-1">0</span></div>
        </div>

        <div id="overlay-dice" class="overlay z-[150]">
            <h2 id="dice-title" class="text-2xl font-black text-yellow-400 mb-8 uppercase tracking-widest text-center px-4 drop-shadow-[0_0_10px_rgba(250,204,21,0.5)]">LANZANDO DADO</h2>
            <div id="dice-arena" class="flex gap-6 justify-center items-center w-full"><div id="dice-cube" class="w-32 h-32 bg-white rounded-3xl flex items-center justify-center text-8xl text-black font-black shadow-[0_0_50px_white]">🎲</div></div>
            <div id="dice-result" class="mt-12 text-center min-h-[96px] flex flex-col justify-center items-center w-full max-w-sm"></div>
        </div>

        <div id="overlay-memoria" class="overlay z-[200]">
            <div class="absolute top-4 right-4 text-3xl cursor-pointer" onclick="Game.closeMemoria()">✕</div>
            <h2 id="memoria-title" class="text-2xl font-black text-blue-400 mb-6 uppercase text-center w-full">Memoria</h2>
            <div id="memoria-grid" class="grid grid-cols-4 gap-4 w-full max-w-sm overflow-y-auto max-h-[70vh]"></div>
        </div>

        <div id="overlay-choice" class="overlay z-[250]"></div>

        <div id="overlay-endgame" class="overlay z-[300]">
            <h1 id="endgame-title" class="text-5xl font-black mb-4 text-center">TÍTULO</h1>
            <p id="endgame-subtitle" class="text-xl text-gray-300 mb-10 text-center font-bold">Subtítulo</p>
            <button class="bg-blue-600 hover:bg-blue-500 text-white font-black py-4 px-10 rounded-full text-xl shadow-[0_0_20px_rgba(0,210,255,0.5)] transition-all active:scale-95 uppercase tracking-widest" onclick="Game.volverAlMenu()">REINICIAR PRUEBA</button>
        </div>

        <div id="notification">NOTIFICACIÓN</div>
    </div>

    <div id="overlay-detail" class="fixed inset-0 bg-black/95 z-[6000] hidden flex-col items-center overflow-y-auto" onclick="Game.closeDetail()">
        <div class="fixed top-4 right-4 text-3xl text-gray-300 hover:text-white cursor-pointer z-[6010] w-12 h-12 flex items-center justify-center bg-black/60 rounded-full border border-gray-600 shadow-[0_0_15px_rgba(0,0,0,0.8)] pb-1" onclick="event.stopPropagation(); Game.closeDetail()">×</div>
        <div class="flex flex-col items-center w-full max-w-sm mt-auto mb-auto py-12 px-4 shrink-0" onclick="event.stopPropagation()">
            <div id="det-art" class="w-48 h-64 md:w-60 md:h-80 shrink-0 rounded-xl border-4 border-white mb-6 flex items-center justify-center font-black text-2xl text-black relative">ARTE</div>
            <h2 id="det-name" class="text-3xl font-black text-yellow-400 uppercase text-center leading-tight">NOMBRE</h2>
            <p id="det-type" class="text-blue-400 font-bold tracking-tighter mb-4 text-sm mt-1">TIPO</p>
            <div id="det-effect" class="bg-white/5 p-5 rounded-xl border border-white/10 text-center w-full text-sm leading-relaxed shrink-0">EFECTO</div>
            <div id="det-actions" class="mt-6 flex flex-col gap-3 w-full max-w-[250px] shrink-0 pb-10"></div>
        </div>
    </div>

    <script src="database.js"></script>
    <script src="game.js"></script>
</body>
</html>
